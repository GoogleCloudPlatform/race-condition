<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Race Condition</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="/config.js"></script>
  </head>
  <body>
    <div class="glass-container">
      <header>
        <div class="logo">
          <span class="pulse-icon"></span>
          <h1>Simulation Admin</h1>
        </div>
        <div class="status-summary">
          <span id="global-status" class="status-badge status-unknown"
            >System Pulse: Scanning...</span
          >
        </div>
      </header>

      <main id="categories-container">
        <!-- Categories and Service Cards will be injected here -->
      </main>

      <footer>
        <p>&copy; 2026 Google N26 DevKey Simulation Team</p>
        <div id="last-update">Last Check: --:--:--</div>
      </footer>
    </div>
    <script type="module" src="main.js"></script>
  </body>
</html>
