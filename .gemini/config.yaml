# Configuration for the Gemini Code Assist GitHub App.
# https://developers.google.com/gemini-code-assist/docs/customize-gemini-behavior-github

# Project-specific guidance for Gemini when reviewing code or triaging issues.
have_fun: false

code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: -1
  pull_request_opened:
    help: false
    summary: true
    code_review: true

# Path filters: skip generated and vendor code in reviews.
ignore_patterns:
  - 'gen_proto/**'
  - 'web/**/dist/**'
  - 'web/**/node_modules/**'
  - 'web/**/.angular/**'
  - 'uv.lock'
  - 'go.sum'
  - 'package-lock.json'
  - '**/*.svg'
  - '**/*.png'
  - 'docs/images/**'
