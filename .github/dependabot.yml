version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions-minor-patch:
        update-types: [minor, patch]

  # Go modules (root module)
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  # Python (uv-managed; Dependabot reads pyproject.toml + uv.lock)
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types: [minor, patch]
    ignore:
      # google-adk pins a2a-sdk<0.4.0 (verified in 1.31.1 and 2.0.0b1).
      # Bumping a2a-sdk to 1.x breaks ADK's deep imports of TransportProtocol,
      # TextPart, etc. The migration code itself is straightforward (see the
      # closed PR #68); revisit when ADK ships a release that supports
      # a2a-sdk 1.x.
      - dependency-name: a2a-sdk
        update-types: [version-update:semver-major]

  # Frontend (Angular)
  - package-ecosystem: npm
    directory: /web/frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      frontend-minor-patch:
        update-types: [minor, patch]

  # Admin dashboard
  - package-ecosystem: npm
    directory: /web/admin-dash
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      admin-dash-minor-patch:
        update-types: [minor, patch]

  # Tester UI
  - package-ecosystem: npm
    directory: /web/tester
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      tester-minor-patch:
        update-types: [minor, patch]

  # Docker base images
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
