name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build Go
        run: go build ./...

      - name: Test Go
        run: go test ./... -short -count=1

      - name: Build Frontend
        working-directory: web/frontend
        run: |
          npm ci
          npm run build

      - name: Build Admin Dashboard
        working-directory: web/admin-dash
        run: |
          npm ci
          npm run build

      - name: Build Tester UI
        working-directory: web/tester
        run: |
          npm ci
          npm run build

      - name: Install Python deps
        run: uv sync --frozen

      - name: Lint Python
        run: uv run ruff check agents/

      - name: Test Python
        run: uv run pytest agents/ -x -q -m "not slow"
