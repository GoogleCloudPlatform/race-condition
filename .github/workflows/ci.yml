name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to least privilege; individual jobs may grant more.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.25'

      - name: Check license headers
        # Year range tolerates files written 2024-2030 without yearly churn.
        run: |
          go install github.com/google/addlicense@latest
          addlicense -check -y "2024-2030" -ignore 'gen_proto/**' -ignore 'web/**/node_modules/**' -ignore 'web/**/dist/**' .

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f  # v4

      - name: Build Go
        run: go build ./...

      - name: Test Go
        run: go test ./... -short -count=1

      - name: Build Frontend
        working-directory: web/frontend
        run: |
          npm ci
          npm run build

      - name: Build Admin Dashboard
        working-directory: web/admin-dash
        run: |
          npm ci
          npm run build

      - name: Build Tester UI
        working-directory: web/tester
        run: |
          npm ci
          npm run build

      - name: Install Python deps
        run: uv sync --frozen

      - name: Lint Python
        run: uv run ruff check agents/

      - name: Test Python
        env:
          GOOGLE_CLOUD_PROJECT: test-project
          GOOGLE_CLOUD_LOCATION: global
        run: uv run pytest agents/ -x -q -m "not slow"
